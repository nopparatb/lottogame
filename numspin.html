<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shared Number Spinner 1–100</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .mono {
      font-family: "Courier New", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-slate-100">

  <!-- Card -->
  <div class="bg-white/95 backdrop-blur-xl p-8 rounded-2xl shadow-xl border border-slate-200 w-[90%] max-w-sm">
    <div class="text-center text-[11px] tracking-[0.22em] text-slate-500 uppercase mb-2">
      Shared Number Spinner
    </div>

    <!-- Display -->
    <div id="numberDisplay"
      class="mono text-center text-5xl sm:text-6xl font-semibold text-slate-900 bg-slate-50 border border-slate-200 rounded-xl py-6 mb-6">
      001
    </div>

    <!-- Controls -->
    <div class="flex gap-3">
      <button id="startStopBtn"
        class="flex-1 py-2.5 rounded-full border border-sky-500 text-sky-600 font-medium tracking-[0.16em] uppercase text-[11px] hover:bg-sky-50 transition">
        Start
      </button>

      <button id="resetBtn"
        class="flex-1 py-2.5 rounded-full border border-slate-400 text-slate-600 font-medium tracking-[0.16em] uppercase text-[11px] hover:bg-slate-100 transition disabled:opacity-40"
        disabled>
        Reset
      </button>
    </div>

    <!-- Status -->
    <div id="status"
      class="text-center text-[10px] tracking-[0.22em] text-slate-400 uppercase mt-3">
      Connecting…
    </div>

    <div class="mt-3 text-[10px] text-center text-slate-400">
      Any device can control this spinner. All open pages see the same number.
    </div>
  </div>

  <!-- Firebase + Spinner Logic -->
  <script type="module">
  // ---------- Firebase imports (CDN modular API) ----------
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
  import {
    getFirestore,
    doc,
    onSnapshot,
    setDoc,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

  // ---------- Your Firebase config ----------
  const firebaseConfig = {
    apiKey: "AIzaSyDxlQWFYRcbGZ133HPEMXYy8tR_KMUiJw0",
    authDomain: "lottogame-16083.firebaseapp.com",
    projectId: "lottogame-16083",
    storageBucket: "lottogame-16083.firebasestorage.app",
    messagingSenderId: "278778623701",
    appId: "1:278778623701:web:c7828b036c617a13fa145c"
  };

  // ---------- Init Firebase & Firestore ----------
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Global doc for spinner state
  const stateRef = doc(db, "global", "stopwatch");

  // ---------- DOM elements ----------
  const display = document.getElementById("numberDisplay");
  const startStopBtn = document.getElementById("startStopBtn");
  const resetBtn = document.getElementById("resetBtn");
  const statusEl = document.getElementById("status");

  // ---------- Tuning parameters (difficulty knobs) ----------
  // Base logical step interval (ms). Smaller = faster.
  const BASE_INTERVAL_MS = 90;   // try 70–120 for “seeable but hard”

  // Wobble amplitude: how strong the speed variation is.
  // 0.0 = constant speed, 1.0 = very wobbly.
  const WOBBLE_AMP = 0.8;        // try 0.6–1.0

  // Wobble period in logical steps: lower = more chaotic.
  const WOBBLE_PERIOD_STEPS = 16; // try 10–25

  // Optional second wobble layer for extra unpredictability:
  const WOBBLE_AMP2 = 0.3;
  const WOBBLE_PERIOD_STEPS2 = 37;

  // ---------- Local state (derived from Firestore) ----------
  // We store the index 0–99 (display = index + 1)
  let latestState = {
    running: false,
    currentIndex: 0,  // when paused, this is the actual index
    startIndex: 0,    // index at the moment of last start
    startTime: Date.now()
  };

  let animRunning = false;
  let rafId = null;

  // Format index (0–99) to "001"–"100"
  function formatNumber(index) {
    const value = ((index % 100) + 100) % 100; // ensure 0–99
    const displayNum = value + 1;             // 1–100
    return String(displayNum).padStart(3, "0");
  }

  // Core difficulty logic: convert elapsed time -> index with variable speed
  function getRunningIndexFromState() {
    const { running, startIndex, startTime, currentIndex } = latestState;

    if (!running) {
      // If not running, just stay at the stored currentIndex
      return (typeof currentIndex === "number" ? currentIndex : 0) % 100;
    }

    const now = Date.now();
    const elapsedMs = Math.max(0, now - startTime);
    const s = elapsedMs / BASE_INTERVAL_MS; // logical base step time

    // First wobble
    const wobble1 = WOBBLE_AMP * Math.sin((2 * Math.PI * s) / WOBBLE_PERIOD_STEPS);

    // Second wobble (different period for less predictability)
    const wobble2 = WOBBLE_AMP2 * Math.sin((2 * Math.PI * s) / WOBBLE_PERIOD_STEPS2 + Math.PI / 3);

    // Combined warped step count
    const warped = s + wobble1 + wobble2;

    const steps = Math.floor(Math.max(0, warped));
    const baseIndex = typeof startIndex === "number" ? startIndex : 0;

    return (baseIndex + steps) % 100;
  }

  function renderOnce() {
    const idx = getRunningIndexFromState();
    display.textContent = formatNumber(idx);

    startStopBtn.textContent = latestState.running ? "Pause" : "Start";

    const hasMoved = idx !== 0 || latestState.running;
    resetBtn.disabled = !hasMoved;

    if (latestState.running) {
      statusEl.textContent = "Spinning";
    } else if (hasMoved) {
      statusEl.textContent = "Stopped";
    } else {
      statusEl.textContent = "Ready";
    }
  }

  function loop() {
    if (!animRunning) return;
    const idx = getRunningIndexFromState();
    display.textContent = formatNumber(idx);
    rafId = requestAnimationFrame(loop);
  }

  function ensureAnimationState() {
    if (latestState.running && !animRunning) {
      animRunning = true;
      rafId = requestAnimationFrame(loop);
    } else if (!latestState.running && animRunning) {
      animRunning = false;
      if (rafId) cancelAnimationFrame(rafId);
      rafId = null;
      renderOnce(); // final precise display at pause
    }
  }

  // ---------- Firestore listener (realtime sync) ----------
  onSnapshot(
    stateRef,
    async (snap) => {
      if (!snap.exists()) {
        // Initialize doc once if it doesn't exist
        await setDoc(stateRef, {
          running: false,
          currentIndex: 0,
          startIndex: 0,
          startTime: Date.now(),
          updatedAt: serverTimestamp()
        });
        return;
      }

      const data = snap.data();

      latestState = {
        running: !!data.running,
        currentIndex:
          typeof data.currentIndex === "number" ? data.currentIndex : 0,
        startIndex:
          typeof data.startIndex === "number" ? data.startIndex : 0,
        startTime:
          typeof data.startTime === "number" ? data.startTime : Date.now()
      };

      renderOnce();
      ensureAnimationState();
    },
    (error) => {
      console.error("Firestore listener error:", error);
      statusEl.textContent = "Error connecting to server";
    }
  );

  statusEl.textContent = "Connecting…";

  // ---------- Button handlers (write to Firestore) ----------
  async function startGlobal() {
    const now = Date.now();
    const idxNow = getRunningIndexFromState();
    await setDoc(
      stateRef,
      {
        running: true,
        currentIndex: idxNow,
        startIndex: idxNow,
        startTime: now,
        updatedAt: serverTimestamp()
      },
      { merge: true }
    );
  }

  async function pauseGlobal() {
    const idxNow = getRunningIndexFromState();
    await setDoc(
      stateRef,
      {
        running: false,
        currentIndex: idxNow,
        updatedAt: serverTimestamp()
      },
      { merge: true }
    );
  }

  async function resetGlobal() {
    await setDoc(
      stateRef,
      {
        running: false,
        currentIndex: 0,
        startIndex: 0,
        startTime: Date.now(),
        updatedAt: serverTimestamp()
      },
      { merge: true }
    );
  }

  startStopBtn.addEventListener("click", () => {
    if (latestState.running) {
      pauseGlobal();
    } else {
      startGlobal();
    }
  });

  resetBtn.addEventListener("click", () => {
    resetGlobal();
  });
</script>

</body>
</html>
