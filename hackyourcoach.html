<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes shake {10%,90%{transform:translateX(-1px);}20%,80%{transform:translateX(2px);}30%,50%,70%{transform:translateX(-4px);}40%,60%{transform:translateX(4px);}}
    .shake {animation:shake .45s;}
  </style>
</head>
<body class="min-h-screen bg-slate-100 flex items-center justify-center p-6">

  <!-- Login Box -->
  <div id="loginBox" class="w-full max-w-md">
    <div class="bg-white shadow-xl rounded-2xl p-8">
      <h1 class="text-2xl font-semibold text-slate-800 text-center">HACK YOUR SENIOR COACH</h1>
      <p class="text-slate-500 text-center mt-1 mb-6">Enter your credentials</p>

      <form id="loginForm" class="space-y-5" novalidate>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
          <input id="email" type="email"
            class="w-full rounded-xl border border-slate-300 px-4 py-2.5"
            value="seniorcoach@kpmg.co.th" readonly/>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
          <input id="password" type="password"
            class="w-full rounded-xl border border-slate-300 px-4 py-2.5"
            placeholder="Enter your password"/>
          <p id="errorMsg" class="hidden mt-2 text-sm text-red-600">The password is not correct.</p>
        </div>
        <button type="submit"
          class="w-full bg-indigo-600 text-white font-medium rounded-xl px-4 py-2.5 hover:bg-indigo-700">
          Sign in
        </button>
      </form>
    </div>
  </div>

  <!-- Success Page -->
  <div id="successBox" class="hidden w-full max-w-md">
    <div class="bg-white shadow-xl rounded-2xl p-8 text-center">
      <h2 class="text-2xl font-bold text-green-600">🎉 Congratulations!</h2>
      <p class="mt-4 text-slate-700">You have won <span class="font-semibold">1,000 happy coins</span>.</p>
      <button id="signOutBtn"
        class="mt-6 w-full bg-red-600 text-white font-medium rounded-xl px-4 py-2.5 hover:bg-red-700">
        Sign Out
      </button>
    </div>
  </div>

  <script>
    (function () {
      const form = document.getElementById('loginForm');
      const pwd = document.getElementById('password');
      const err = document.getElementById('errorMsg');
      const loginBox = document.getElementById('loginBox');
      const successBox = document.getElementById('successBox');
      const signOutBtn = document.getElementById('signOutBtn');
      const OK_PASSWORD = "kpmgLnwza@2568";

      function showError() {
        err.classList.remove('hidden');
        pwd.classList.add('border-red-500', 'shake');
        setTimeout(() => pwd.classList.remove('shake'), 500);
      }

      function clearError() {
        err.classList.add('hidden');
        pwd.classList.remove('border-red-500');
      }

      pwd.addEventListener('input', clearError);

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        if (pwd.value === OK_PASSWORD) {
          clearError();
          loginBox.classList.add('hidden');
          successBox.classList.remove('hidden');
        } else {
          showError();
          pwd.focus();
        }
      });

      signOutBtn.addEventListener('click', () => {
        successBox.classList.add('hidden');
        loginBox.classList.remove('hidden');
        form.reset();
      });
    })();
  </script>
</body>
</html>
